version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./.env
    ports:
      - "5000:5000"
    volumes:
      # Mount the images directory to persist uploaded files
      - ./backend/images:/app/backend/images
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: mysql:8.0
    env_file: ./.env
    ports:
      # Exposing the DB port to the host can be useful for debugging with a DB client
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  db_data: